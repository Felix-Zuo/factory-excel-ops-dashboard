name: Bug report
description: Report a reproducible issue in the reusable toolkit.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use sample data or a minimized fixture.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python:
        - Project version:
  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety
      options:
        - label: The report contains no real customer, supplier, employee, order, BOM, shipment, finance, HR, or production data.
          required: true
